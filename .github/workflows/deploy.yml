name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 子仓库（ros2_learning / python_learning…）push 后发来的信号，自动重建博客（秒级即时，需 secret）
  repository_dispatch:
    types: [content-update]
  # 定时兜底：每 6 小时自动重建一次，拉取所有子模块最新内容。
  # 有了它，新加的子仓库即使没配 secret，最多 6 小时内也会自动上线。
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（只取顶层子模块的笔记，不递归——避免 ros2_learning 里坏掉的嵌套子模块）
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: 同步子模块到最新（非递归）
        run: git submodule update --remote
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
